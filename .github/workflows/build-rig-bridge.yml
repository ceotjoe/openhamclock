# Builds standalone rig-bridge executables for Windows, Mac (x64 + arm64), and Linux.
# Runs on every push to feature/tci-rig-bridge-plugin that touches rig-bridge/,
# and publishes a rolling pre-release (tag: rig-bridge-latest).

name: Build Rig Bridge

on:
  push:
    branches: [fork/ci]
    paths: ['rig-bridge/**']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node18-win-x64
            output: ohc-rig-bridge-win.exe
            artifact: rig-bridge-win-x64

          - os: macos-latest # Apple Silicon
            target: node18-macos-arm64
            output: ohc-rig-bridge-macos-arm
            artifact: rig-bridge-mac-arm64

          - os: ubuntu-latest
            target: node18-linux-x64
            output: ohc-rig-bridge-linux
            artifact: rig-bridge-linux-x64

          - os: ubuntu-latest
            target: node18-linux-arm64
            output: ohc-rig-bridge-linux-arm64
            artifact: rig-bridge-linux-arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rig-bridge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install deps — this downloads platform-specific serialport prebuilds
      - run: npm install

      # Build standalone executable with @yao-pkg/pkg (drop-in replacement for pkg)
      - name: Build executable
        run: npx --yes @yao-pkg/pkg . --target ${{ matrix.target }} --output dist/${{ matrix.output }} --compress GZip

      - name: Set permissions
        if: runner.os != 'Windows'
        run: chmod +x dist/${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rig-bridge/dist/${{ matrix.output }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Delete old rolling release and its tag so we can replace them cleanly
      - name: Delete existing rolling release
        run: gh release delete rig-bridge-latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rig-bridge-latest
          name: "Rig Bridge – Latest"
          prerelease: true
          make_latest: false
          body: |
            Automated build from branch `${{ github.ref_name }}`

            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}

            > This is a rolling pre-release. Each push to the branch overwrites this release.
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
